name: publish

on:
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'

concurrency: ${{ github.ref }}

env:
  APPLICATION_NAME: 'dingo'

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      RELEASE_ID: ${{ steps.create-release.outputs.result }}
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0 https://github.com/actions/github-script/releases/tag/v9.0.0
        id: create-release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            try {
              const response = await github.rest.repos.createRelease({
                draft: true,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });

              return response.data.id;
            } catch (error) {
              core.setFailed(error.message);
            }

  build-binaries:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            os: darwin
            arch: arm64
          - runner: ubuntu-latest
            os: freebsd
            arch: amd64
          - runner: ubuntu-latest
            os: freebsd
            arch: arm64
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
          - runner: windows-latest
            os: windows
            arch: amd64
          - runner: windows-latest
            os: windows
            arch: arm64
    runs-on: ${{ matrix.runner }}
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - name: Set RELEASE_TAG
        run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
        shell: bash
      - run: git config --global --add safe.directory $PWD
        shell: bash
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0 https://github.com/actions/checkout/releases/tag/v6.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 https://github.com/actions/setup-go/releases/tag/v6.4.0
        with:
          go-version: 1.25.x
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 https://github.com/actions/cache/releases/tag/v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ${{ runner.os == 'macOS' && '~/Library/Caches/go-build' || runner.os == 'Windows' && '~\\AppData\\Local\\go-build' || '~/.cache/go-build' }}
          key: ${{ runner.os }}-go-1.25.x-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.25.x-
      - name: Build binary
        run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} make build
        shell: bash
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          _binary_name=${{ env.APPLICATION_NAME }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            _binary_name="${{ env.APPLICATION_NAME }}.exe"
          fi
          _filename=${{ env.APPLICATION_NAME }}-${{ env.RELEASE_TAG }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          tar czf ${_filename} ${_binary_name}
          curl \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @${_filename} \
            https://uploads.github.com/repos/${{ github.repository_owner }}/${{ env.APPLICATION_NAME }}/releases/${{ needs.create-draft-release.outputs.RELEASE_ID }}/assets?name=${_filename}
        shell: bash
      - name: Attest binary
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0 
        with:
          subject-path: "${{ matrix.os == 'windows' && format('{0}.exe', env.APPLICATION_NAME) || env.APPLICATION_NAME }}"

  build-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - run: git config --global --add safe.directory $PWD
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0 https://github.com/actions/checkout/releases/tag/v6.0.0
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0 https://github.com/docker/login-action/releases/tag/v4.0.0
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }} # uses token
      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0 https://github.com/docker/login-action/releases/tag/v4.0.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            blinklabs/dingo
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-${{ matrix.arch }}
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build images
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          outputs: "type=registry,push=true"
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            COMMIT_HASH=${{ github.sha }}
      - name: Attest Docker Hub image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: docker.io/blinklabs/dingo
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest GHCR image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      # Antithesis instrumented image (amd64 only, reuses build cache)
      - id: antithesis-meta
        if: matrix.arch == 'amd64'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            blinklabs/dingo
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-antithesis
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build and push antithesis image
        if: matrix.arch == 'amd64'
        id: antithesis-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          outputs: "type=registry,push=true"
          platforms: linux/amd64
          target: antithesis
          tags: ${{ steps.antithesis-meta.outputs.tags }}
          labels: ${{ steps.antithesis-meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            COMMIT_HASH=${{ github.sha }}
      - name: Attest antithesis Docker Hub image
        if: matrix.arch == 'amd64'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: docker.io/blinklabs/dingo
          subject-digest: ${{ steps.antithesis-push.outputs.digest }}
          push-to-registry: true
      - name: Attest antithesis GHCR image
        if: matrix.arch == 'amd64'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.antithesis-push.outputs.digest }}
          push-to-registry: true
      # Txpump image (amd64 only)
      - id: txpump-meta
        if: matrix.arch == 'amd64'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/dingo-txpump
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build and push txpump image
        if: matrix.arch == 'amd64'
        id: txpump-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          context: internal/test/antithesis
          outputs: "type=registry,push=true"
          platforms: linux/amd64
          file: internal/test/antithesis/Dockerfile.txpump
          tags: ${{ steps.txpump-meta.outputs.tags }}
          labels: ${{ steps.txpump-meta.outputs.labels }}
      - name: Attest txpump GHCR image
        if: matrix.arch == 'amd64'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/dingo-txpump
          subject-digest: ${{ steps.txpump-push.outputs.digest }}
          push-to-registry: true
      # Configurator image (amd64 only)
      - id: configurator-meta
        if: matrix.arch == 'amd64'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/dingo-configurator
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build and push configurator image
        if: matrix.arch == 'amd64'
        id: configurator-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          context: internal/test/antithesis
          outputs: "type=registry,push=true"
          platforms: linux/amd64
          file: internal/test/antithesis/Dockerfile.configurator
          tags: ${{ steps.configurator-meta.outputs.tags }}
          labels: ${{ steps.configurator-meta.outputs.labels }}
      - name: Attest configurator GHCR image
        if: matrix.arch == 'amd64'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/dingo-configurator
          subject-digest: ${{ steps.configurator-push.outputs.digest }}
          push-to-registry: true
      # Analysis image (amd64 only)
      - id: analysis-meta
        if: matrix.arch == 'amd64'
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/dingo-analysis
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build and push analysis image
        if: matrix.arch == 'amd64'
        id: analysis-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0 https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          context: internal/test/antithesis
          outputs: "type=registry,push=true"
          platforms: linux/amd64
          file: internal/test/antithesis/Dockerfile.analysis
          tags: ${{ steps.analysis-meta.outputs.tags }}
          labels: ${{ steps.analysis-meta.outputs.labels }}
      - name: Attest analysis GHCR image
        if: matrix.arch == 'amd64'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/dingo-analysis
          subject-digest: ${{ steps.analysis-push.outputs.digest }}
          push-to-registry: true

  build-image-manifest:
    needs: [build-images]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }} # uses token
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0 https://github.com/docker/metadata-action/releases/tag/v6.0.0
        with:
          images: |
            blinklabs/dingo
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: manifest-create
        shell: bash
        run: |
          for t in `echo '${{ steps.meta.outputs.tags }}'`; do
            # Extract the underlying manifests from each manifests list and create a new single manifest list
            docker manifest create ${t} \
              $(docker manifest inspect ${t}-amd64 | jq -r '.manifests[] | .digest' | sed -e "s|^|${t%:*}@|") \
              $(docker manifest inspect ${t}-arm64 | jq -r '.manifests[] | .digest' | sed -e "s|^|${t%:*}@|")
            docker manifest push ${t}
          done
      # Checkout repo so README.md is available for next step
      - uses: actions/checkout@v6
      # Update Docker Hub from README
      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0 https://github.com/peter-evans/dockerhub-description/releases/tag/v5.0.0
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: blinklabs/${{ env.APPLICATION_NAME }}
          readme-filepath: ./README.md
          short-description: "Dingo is a Cardano blockchain data node"

  finalize-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-draft-release, build-binaries, build-images, build-image-manifest]
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0 https://github.com/actions/github-script/releases/tag/v9.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-draft-release.outputs.RELEASE_ID }},
                draft: false,
              });
            } catch (error) {
              core.setFailed(error.message);
            }

      # This updates the documentation on pkg.go.dev and the latest version available via the Go module proxy
      - name: Pull new module version
        if: startsWith(github.ref, 'refs/tags/')
        uses: andrewslotin/go-proxy-pull-action@e5aea3b8b3478fc5b76befda4390513868ed2dc8 # v1.4.0 https://github.com/andrewslotin/go-proxy-pull-action/releases/tag/v1.4.0

  npm-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: [finalize-release]
    steps:
      - run: |
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${RELEASE_TAG:1}" >> $GITHUB_ENV
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0 https://github.com/actions/checkout/releases/tag/v6.0.0
        if: startsWith(github.ref, 'refs/tags/')
      - name: setup nodejs
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 https://github.com/actions/setup-node/releases/tag/v6.3.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Update package.json
        run: sed -e "s/0.999.0/${RELEASE_VERSION}/" .github/package.json > package.json
        if: startsWith(github.ref, 'refs/tags/')
      - name: Publish to NPM
        run: npm publish --provenance --access public
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
